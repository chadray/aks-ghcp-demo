apiVersion: v1
kind: Namespace
metadata:
  name: scenario-applogs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: applogs-demo
  namespace: scenario-applogs
  labels:
    scenario: application-logs
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
      scenario: application-logs
  template:
    metadata:
      labels:
        app: demo-app
        scenario: application-logs
    spec:
      containers:
      - name: app
        image: ghcpdemoacr.azurecr.io/applogs-demo:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: LOG_LEVEL
          value: "INFO"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: applogs-demo
  namespace: scenario-applogs
  labels:
    scenario: application-logs
    app: demo-app
spec:
  selector:
    app: demo-app
    scenario: application-logs
  ports:
  - name: http
    port: 8080
    targetPort: 8080
