apiVersion: v1
kind: Namespace
metadata:
  name: scenario-crashloop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: scenario-crashloop
  labels:
    scenario: crashloopbackoff
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
      scenario: crashloopbackoff
  template:
    metadata:
      labels:
        app: demo-app
        scenario: crashloopbackoff
    spec:
      containers:
      - name: app
        image: ghcpdemoacr.azurecr.io/crashloop-demo:v1
        imagePullPolicy: Always
        # The app reads its config from /app/config/application.conf, which is
        # expected to be supplied by a volume mounted at /app/config.
        #
        # >>> THE BUG: that volume mount is missing. <<<
        # Without it, the config file does not exist, the app exits with code 1,
        # and Kubernetes restarts it repeatedly -> CrashLoopBackOff.
        #
        # To FIX, create the ConfigMap (see README) and uncomment the
        # volumeMounts below plus the volumes block at the pod level:
        # volumeMounts:
        # - name: config
        #   mountPath: /app/config
        #   readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      restartPolicy: Always
      # volumes:
      # - name: config
      #   configMap:
      #     name: app-config
