apiVersion: v1
kind: Namespace
metadata:
  name: scenario-imagepull
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagepull-demo
  namespace: scenario-imagepull
  labels:
    scenario: imagepullbackoff
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
      scenario: imagepullbackoff
  template:
    metadata:
      labels:
        app: demo-app
        scenario: imagepullbackoff
    spec:
      containers:
      - name: app
        # The image repository exists in ACR, but the ":latest" tag was never
        # pushed (only ":v1" exists). AKS can authenticate to the attached
        # registry, but the manifest for ":latest" is not found, so the pull
        # fails with ImagePullBackOff ("manifest unknown").
        #
        # >>> THE BUG: wrong/nonexistent image tag. <<<
        # To FIX, point this at a tag that actually exists, e.g.:
        #   image: ${ACR_LOGIN_SERVER}/imagepull-demo:v1
        image: ${ACR_LOGIN_SERVER}/imagepull-demo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      restartPolicy: Always
